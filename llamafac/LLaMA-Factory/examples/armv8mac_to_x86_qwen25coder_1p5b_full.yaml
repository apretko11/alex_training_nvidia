### model
model_name_or_path: Qwen/Qwen2.5-Coder-1.5B-Instruct
hub_model_id: armv8mac_to_x86_qwen25coder_1p5b_full
hub_strategy: end
#cache_dir: ~/.cache/huggingface

### method
stage: sft
do_train: true
finetuning_type: full

### dataset
dataset:
  - armv8mac_to_x86_000
  - armv8mac_to_x86_001
  - armv8mac_to_x86_002
  - armv8mac_to_x86_003
  - armv8mac_to_x86_004
  - armv8mac_to_x86_005
  - armv8mac_to_x86_006

template: qwen
cutoff_len: 8192
packing: true
max_samples: 5000000
overwrite_cache: false
preprocessing_num_workers: 2

### output
output_dir: saves/armv8mac_to_x86_qwen25coder_1p5b_full
logging_steps: 10
save_steps: 500
plot_loss: true
save_total_limit: 1
save_only_model: true
overwrite_output_dir: true
push_to_hub: false
hub_always_push: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
gradient_checkpointing: false
learning_rate: 2e-05
num_train_epochs: 0.5
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
ddp_timeout: 180000000
flash_attn: fa2
enable_liger_kernel: true
